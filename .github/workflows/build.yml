name: Build ZovexInjector APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Download gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          test -s gradle/wrapper/gradle-wrapper.jar || exit 1

      - name: Create launcher icons
        run: |
          python3 - << 'EOF'
          import struct, zlib, os
          def make_png(sz, r, g, b):
              def chunk(n, d):
                  c = zlib.crc32(n + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + n + d + struct.pack('>I', c)
              rows = b''.join(b'\x00' + bytes([r, g, b] * sz) for _ in range(sz))
              ihdr = struct.pack('>IIBBBBB', sz, sz, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(rows)) +
                      chunk(b'IEND', b''))
          for folder, sz in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
              png = make_png(sz, 0, 245, 196)
              open(f'app/src/main/res/{folder}/ic_launcher.png','wb').write(png)
              open(f'app/src/main/res/{folder}/ic_launcher_round.png','wb').write(png)
          print('Icons OK')
          EOF

      - name: chmod gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > signing.keystore
          else
            keytool -genkey -v -keystore signing.keystore -alias zovex \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass 'Zovex_2024' -keypass 'Zovex_2024' \
              -dname "CN=ZovexInjector,O=Zovex,C=IL" -noprompt
          fi

      - name: Sign APK
        run: |
          BT="${ANDROID_HOME}/build-tools/$(ls -v ${ANDROID_HOME}/build-tools | tail -1)"
          IN="app/build/outputs/apk/release/app-release-unsigned.apk"
          AL="app/build/outputs/apk/release/aligned.apk"
          OUT="app/build/outputs/apk/release/ZovexInjector.apk"
          "${BT}/zipalign" -p -f 4 "${IN}" "${AL}"
          "${BT}/apksigner" sign \
            --ks signing.keystore --ks-key-alias zovex \
            --ks-pass pass:'Zovex_2024' --key-pass pass:'Zovex_2024' \
            --v1-signing-enabled true --v2-signing-enabled true \
            --out "${OUT}" "${AL}"
          "${BT}/apksigner" verify --verbose "${OUT}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZovexInjector
          path: app/build/outputs/apk/release/ZovexInjector.apk
          retention-days: 90
          compression-level: 0
