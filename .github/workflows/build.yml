name: Build ZovexInjector APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Download smali tools into assets
        run: |
          mkdir -p app/src/main/assets
          curl -fL "https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat.jar" \
            -o app/src/main/assets/baksmali.jar
          curl -fL "https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat.jar" \
            -o app/src/main/assets/smali.jar
          ls -lh app/src/main/assets/
          test -s app/src/main/assets/baksmali.jar || exit 1
          test -s app/src/main/assets/smali.jar || exit 1
          echo "smali tools ready"

      - name: chmod gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > signing.keystore
          else
            keytool -genkey -v \
              -keystore signing.keystore \
              -alias zovex \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass 'Zovex_2024' -keypass 'Zovex_2024' \
              -dname "CN=ZovexInjector,O=Zovex,C=IL" -noprompt
          fi

      - name: Sign APK
        run: |
          BT="${ANDROID_HOME}/build-tools/$(ls -v ${ANDROID_HOME}/build-tools | tail -1)"
          IN="app/build/outputs/apk/release/app-release-unsigned.apk"
          AL="app/build/outputs/apk/release/aligned.apk"
          OUT="app/build/outputs/apk/release/ZovexInjector.apk"
          "${BT}/zipalign" -p -f 4 "${IN}" "${AL}"
          "${BT}/apksigner" sign \
            --ks signing.keystore --ks-key-alias zovex \
            --ks-pass pass:'Zovex_2024' --key-pass pass:'Zovex_2024' \
            --v1-signing-enabled true --v2-signing-enabled true \
            --out "${OUT}" "${AL}"
          "${BT}/apksigner" verify --verbose "${OUT}"
          ls -lh "${OUT}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZovexInjector
          path: app/build/outputs/apk/release/ZovexInjector.apk
          retention-days: 90
          compression-level: 0
